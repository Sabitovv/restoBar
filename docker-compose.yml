version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: tma_cafe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/tma_cafe
      REDIS_URL: redis://redis:6379/0
      DEV_MODE: "1"
      DEV_APP_URL: http://localhost:3000
      APP_URL: http://localhost:5000
      WEBHOOK_URL: http://localhost:5000
      BOT_TOKEN: ${BOT_TOKEN:-}
      PAYMENT_PROVIDER_TOKEN: ${PAYMENT_PROVIDER_TOKEN:-}
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
